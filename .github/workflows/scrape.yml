name: Scrape and update events

on:
  # 月・水・土の朝6時JST = 21:00 UTC（前日：日曜・火曜・金曜）
  schedule:
    - cron: '0 21 * * 0,2,5'
  # 手動でも実行可
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 自動コミット用

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrapers (without image download)
        run: |
          # 元URL参照方式なので画像DLは不要
          python run_all.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TS=$(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')
            git commit -m "data: scheduled update at ${TS}"
            git push
          fi
